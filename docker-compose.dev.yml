# docker-compose.dev.yml — Development overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  celery_worker:
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    command: celery -A app.documents.ingestion.tasks worker --loglevel=debug --concurrency=2

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
